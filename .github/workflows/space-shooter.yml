name: Update Space Shooter GIF

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create assets folder
        run: mkdir -p assets

      - name: Generate Space Shooter GIF
        uses: czl9707/gh-space-shooter@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-user-name: The-Abhishek-Singh
          output-path: assets/space-shooter.gif
          strategy: random

      - name: Commit & Push GIF
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add assets/space-shooter.gif
          git commit -m "update space shooter gif" || echo "No changes"
          git push
